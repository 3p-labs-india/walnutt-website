<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#3A6B4C" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#3A6B4C" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#1A2420" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#1A2420"/>

  <!-- Aurora glow -->
  <ellipse cx="600" cy="280" rx="500" ry="300" fill="url(#glow)"/>

  <!-- Walnutt hexagon logo -->
  <g transform="translate(540, 160) scale(1.2)">
    <path d="M50 4 L81 22 L81 58 L50 76 L19 58 L19 22 Z" stroke="#5A8F6E" stroke-width="2.5" fill="none" stroke-linejoin="round" opacity="0.6"/>
    <path d="M44 24 L30 40 L44 56" stroke="#5A8F6E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
    <path d="M56 24 L70 40 L56 56" stroke="#5A8F6E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
  </g>

  <!-- Walnutt text -->
  <text x="600" y="320" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="42" fill="white" text-anchor="middle" letter-spacing="-0.5">Walnutt</text>

  <!-- Tagline line 1 -->
  <text x="600" y="390" font-family="Georgia, serif" font-weight="400" font-size="32" fill="rgba(255,255,255,0.7)" text-anchor="middle">One conversation.</text>

  <!-- Tagline line 2 -->
  <text x="600" y="435" font-family="Georgia, serif" font-weight="400" font-size="32" fill="#5A8F6E" text-anchor="middle" font-style="italic">The right companies find you.</text>

  <!-- Subtle divider -->
  <line x1="550" y1="470" x2="650" y2="470" stroke="#5A8F6E" stroke-width="1.5" opacity="0.3"/>

  <!-- Bottom line -->
  <text x="600" y="510" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="18" fill="rgba(255,255,255,0.3)" text-anchor="middle">walnutt.co</text>
</svg>
